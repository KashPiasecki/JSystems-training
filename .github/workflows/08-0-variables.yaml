name: '08 - 0 - Variables'
on: 
  workflow_dispatch:

env:
  WORKFLOW_VAR: 'I am a workflow variable'
  OVERWRITTEN_VAR: 'I will be overwritten'

jobs:
  echo:
    runs-on: ubuntu-latest
    env:
      JOB_VAR: 'I am a job variable'
      OVERWRITTEN_VAR: 'I have been overwritten at the job level'
    steps:
      - name: 'Echo variables'
        env:
          STEP_VAR: 'I am a step variable'
        run: |
          echo "Workflow variable: $WORKFLOW_VAR"
          echo "Job variable: $JOB_VAR"
          echo "Step variable: $STEP_VAR"
          echo "Overwritten variable: $OVERWRITTEN_VAR"
      - name: 'Echo variables'
        env:
          STEP_VAR: 'I am a step variable'
          OVERWRITTEN_VAR: 'I will overwrite the job variable'
        run: |
          echo "Workflow variable: $WORKFLOW_VAR"
          echo "Job variable: $JOB_VAR"
          echo "Step variable: $STEP_VAR"
          echo "Overwritten variable: $OVERWRITTEN_VAR"

# WRONG — secrets are masked in logs but ${{ }} expands them inline in YAML
# This can accidentally expose secrets in runner process args
# run: ./script.sh ${{ secrets.MY_SECRET }}

# CORRECT — pass secrets via env, access as shell vars
# env:
#   MY_SECRET: ${{ secrets.MY_SECRET }}
# run: ./script.sh "$MY_SECRET"
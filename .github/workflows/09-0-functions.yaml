name: '09 - Using Functions'
on:
  workflow_dispatch:
jobs:
  echo1:
    runs-on: ubuntu-latest
    steps:
      - name: 'Failing step'
        id: 'fail_step'
        run: exit 1
      - name: 'I will be skipped'
        if: success() 
        run: echo 'I will print if previous step succeeded'
      - name: 'I will execute'
        if: failure()
        run: |
          echo 'I will print if any previous step fails.'
          sleep 1000
      - name: 'I will execute'
        if: '!cancelled()'
        run: echo 'I will always print, except when the workflow is cancelled.'
      - name: 'I will execute when cancelled'
        if: cancelled()
        run: echo 'I will run only when cancelled'
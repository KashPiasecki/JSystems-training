name: '14 - Working with artifacts'
on:
  workflow_dispatch:
jobs:
  test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-app
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: app-react
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/cache@v5E
        with:
          key: deps-node-modules-${{ hashFiles('14-artifacts/react-app/package-lock.json') }}
          path: react-app/node_modules
      - working-directory: react-app
        run: npm ci
      - working-directory: react-app
        run: npm test
      - working-directory: react-app
        run: npm build
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: react-app/build
  deploy:
    runs-on: ubuntu-latest
    needs: test-build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app
          path: build
      - run: ls -R

name: '10 - 0 - Controlling the Execution Flow'
on: 
  workflow_dispatch:
    inputs:
      pass-unit-tests:
        description: 'Unit tests pass indicator'
        required: true
        type: boolean
        default: false
jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Lint&Buld'
        run: echo "Linting and building project"
  unit-tests:
    runs-on: ubuntu-latest
    # continue-on-error: true
    steps:
      - name: 'Running unit tests'
        id: rut
        run: echo 'Running tests'
      - name: 'Failing tests'
        id: failed_rut
        if: ${{ !inputs.pass-unit-tests }}
        run: |
          echo 'Failing due to pass unit tests set to: ${{ inputs.pass-unit-tests }}'
          exit 1
  deploy-nonprod:
    runs-on: ubuntu-latest
    needs: [ lint-build, unit-tests ]
    if: ${{ needs.lint-build.result == 'success' && needs.unit-tests.result == 'success' }}
    steps:
      - name: 'Deploy'
        run: echo 'Deploy to nonprod...'
  run-e2e:
    runs-on: ubuntu-latest
    needs: deploy-nonprod
    if: success()
    steps:
      - name: 'Rune2eTests'
        run: echo 'Running E2E tests...'
  load-tests:
    runs-on: ubuntu-latest
    needs: deploy-nonprod
    if: success()
    steps:
      - name: 'RunLoadTests'
        run: echo 'Running Load tests...'
  deploy-tests:
    runs-on: ubuntu-latest
    needs: [run-e2e,load-tests]
    if: success()
    steps:
      - name: 'RunLoadTests'
        run: echo 'Running Load tests...'
  


    